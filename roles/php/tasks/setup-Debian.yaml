---
- name: Add php's ppa
  become: true
  shell: add-apt-repository ppa:ondrej/php -y
  args:
    creates: /etc/apt/sources.list.d/ondrej-ubuntu-php-noble.sources

- name: Install PHP packages for all versions
  become: true
  apt:
    name: "{{ php_versions | product(php_extensions) | map('join', '-') | map('regex_replace', '^', 'php') | list }}"
  # 8.3 + [cli, fpm, ...] -> [php8.3-cli, php8.3-fpm, ...]

- name: Select default PHP version via alternatives
  become: true
  alternatives:
    name: php
    path: "/usr/bin/php{{ item }}"
    link: /usr/bin/php
    priority: "{{ 100 if item == php_default_version else 50 }}"
  loop: "{{ php_versions }}"

- name: Write 99-custom.ini for each version (cli + fpm)
  become: true
  copy:
    src: php.ini
    dest: "/etc/php/{{ item.0 }}/{{ item.1 }}/conf.d/99-custom.ini"
  loop: "{{ php_versions | product(['cli', 'fpm']) | list }}"
