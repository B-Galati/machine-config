---
- name: Check for existing GPG key
  become: true
  stat:
    path: /usr/share/keyrings/githubcli-archive-keyring.gpg
  register: github_cli_gpg
  changed_when: False

- name: Import GPG key
  become: true
  shell: |
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /usr/share/keyrings/githubcli-archive-keyring.gpg
    chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
  when: not github_cli_gpg.stat.exists

- name: Add GitHub CLI repository
  become: true
  deb822_repository:
    name: github-cli
    types: deb
    uris: https://cli.github.com/packages
    suites: stable
    components: main
    architectures: amd64
    signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
    state: present
  register: github_cli_repo

- name: Update apt cache
  become: true
  apt:
    update_cache: yes
  when: github_cli_repo.changed

- name: Install GitHub CLI
  become: true
  apt:
    name: gh
